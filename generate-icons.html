<!DOCTYPE html>
<html>
<head>
  <title>Tiki Tracker Icon Generator</title>
  <style>
    body { font-family: sans-serif; padding: 40px; background: #1a3a3a; color: #e8dcc8; }
    canvas { border: 1px solid #3d6b5e; margin: 20px; border-radius: 12px; }
    h1 { color: #f4a942; }
    p { color: #8fbfb0; margin-bottom: 20px; }
  </style>
</head>
<body>
  <h1>Tiki Tracker — App Icons</h1>
  <p>Right-click each icon below and "Save Image As" with the filename shown.</p>

  <h3 style="color:#f4a942;">icon-192.png</h3>
  <canvas id="icon192" width="192" height="192"></canvas>

  <h3 style="color:#f4a942;">icon-512.png</h3>
  <canvas id="icon512" width="512" height="512"></canvas>

  <script>
    function drawIcon(canvas) {
      const ctx = canvas.getContext('2d');
      const s = canvas.width;

      // Background
      ctx.fillStyle = '#1a3a3a';
      ctx.fillRect(0, 0, s, s);

      // Render SVG to canvas via image
      const svg = `<svg width="${s}" height="${s}" viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="woodMain" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6B3A1F"/>
            <stop offset="25%" stop-color="#8B5E3C"/>
            <stop offset="50%" stop-color="#7A4B2A"/>
            <stop offset="75%" stop-color="#9B6B42"/>
            <stop offset="100%" stop-color="#6B3A1F"/>
          </linearGradient>
          <linearGradient id="woodDark" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#4A2510"/>
            <stop offset="50%" stop-color="#5C3318"/>
            <stop offset="100%" stop-color="#4A2510"/>
          </linearGradient>
          <linearGradient id="woodLight" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#A07040"/>
            <stop offset="50%" stop-color="#B8864E"/>
            <stop offset="100%" stop-color="#8B5E3C"/>
          </linearGradient>
          <linearGradient id="armGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#9B6B42"/>
            <stop offset="100%" stop-color="#6B3A1F"/>
          </linearGradient>
        </defs>
        <path d="M25 58 L25 88 Q25 94 32 94 L48 94 Q55 94 55 88 L55 58 Z" fill="url(#woodMain)" stroke="#4A2510" stroke-width="0.8"/>
        <path d="M32 62 L32 80" stroke="#4A2510" stroke-width="0.6" opacity="0.5"/>
        <path d="M40 60 L40 90" stroke="#4A2510" stroke-width="0.5" opacity="0.4"/>
        <path d="M48 62 L48 80" stroke="#4A2510" stroke-width="0.6" opacity="0.5"/>
        <path d="M33 65 Q40 70 47 65" fill="none" stroke="#4A2510" stroke-width="1" opacity="0.6"/>
        <path d="M35 72 Q40 75 45 72" fill="none" stroke="#4A2510" stroke-width="0.8" opacity="0.5"/>
        <path d="M22 10 Q22 4 30 3 L50 3 Q58 4 58 10 L58 50 Q58 56 50 57 L30 57 Q22 56 22 50 Z" fill="url(#woodMain)" stroke="#4A2510" stroke-width="1"/>
        <path d="M24 18 Q28 13 40 13 Q52 13 56 18 L56 24 Q52 20 40 20 Q28 20 24 24 Z" fill="url(#woodDark)"/>
        <path d="M26 16 Q40 11 54 16" fill="none" stroke="#3A1A08" stroke-width="1.2"/>
        <ellipse cx="33" cy="28" rx="5.5" ry="6" fill="#2A1508"/>
        <ellipse cx="47" cy="28" rx="5.5" ry="6" fill="#2A1508"/>
        <ellipse cx="33" cy="28" rx="3.5" ry="4" fill="#f4a942"/>
        <ellipse cx="47" cy="28" rx="3.5" ry="4" fill="#f4a942"/>
        <ellipse cx="33" cy="27" rx="1.8" ry="2" fill="#ffe080" opacity="0.6"/>
        <ellipse cx="47" cy="27" rx="1.8" ry="2" fill="#ffe080" opacity="0.6"/>
        <path d="M37 30 L35 38 Q36 40 40 40 Q44 40 45 38 L43 30" fill="url(#woodDark)" stroke="#3A1A08" stroke-width="0.6"/>
        <circle cx="37" cy="38" r="1.5" fill="#2A1508"/>
        <circle cx="43" cy="38" r="1.5" fill="#2A1508"/>
        <path d="M28 44 Q30 42 40 42 Q50 42 52 44 L52 50 Q50 52 40 52 Q30 52 28 50 Z" fill="#2A1508" stroke="#3A1A08" stroke-width="0.8"/>
        <rect x="30" y="44" width="4" height="5" rx="0.5" fill="#e8dcc8" stroke="#c4b49a" stroke-width="0.3"/>
        <rect x="35" y="44" width="4" height="5" rx="0.5" fill="#e8dcc8" stroke="#c4b49a" stroke-width="0.3"/>
        <rect x="40" y="44" width="4" height="5" rx="0.5" fill="#e8dcc8" stroke="#c4b49a" stroke-width="0.3"/>
        <rect x="45" y="44" width="4" height="5" rx="0.5" fill="#e8dcc8" stroke="#c4b49a" stroke-width="0.3"/>
        <rect x="32" y="48" width="3.5" height="3" rx="0.5" fill="#d4c8b0" stroke="#c4b49a" stroke-width="0.3"/>
        <rect x="37" y="48" width="3.5" height="3" rx="0.5" fill="#d4c8b0" stroke="#c4b49a" stroke-width="0.3"/>
        <rect x="42" y="48" width="3.5" height="3" rx="0.5" fill="#d4c8b0" stroke="#c4b49a" stroke-width="0.3"/>
        <path d="M26 8 Q30 6 34 8" fill="none" stroke="#4A2510" stroke-width="0.7" opacity="0.6"/>
        <path d="M46 8 Q50 6 54 8" fill="none" stroke="#4A2510" stroke-width="0.7" opacity="0.6"/>
        <path d="M24 35 L26 32" stroke="#4A2510" stroke-width="0.7" opacity="0.5"/>
        <path d="M56 35 L54 32" stroke="#4A2510" stroke-width="0.7" opacity="0.5"/>
        <path d="M22 25 Q19 30 22 35" fill="none" stroke="#4A2510" stroke-width="1.5"/>
        <path d="M58 25 Q61 30 58 35" fill="none" stroke="#4A2510" stroke-width="1.5"/>
        <path d="M25 60 Q20 62 18 70 Q16 78 18 82" fill="url(#armGrad)" stroke="#4A2510" stroke-width="0.8"/>
        <circle cx="18" cy="83" r="3" fill="url(#woodLight)" stroke="#4A2510" stroke-width="0.6"/>
        <path d="M55 60 Q62 58 65 52 Q67 48 65 42" fill="url(#armGrad)" stroke="#4A2510" stroke-width="0.8"/>
        <ellipse cx="63" cy="50" rx="4" ry="6" fill="url(#woodLight)" stroke="#4A2510" stroke-width="0.6" opacity="0.7"/>
        <path d="M65 42 Q64 36 60 33 Q58 31 56 32" fill="url(#armGrad)" stroke="#4A2510" stroke-width="0.8"/>
        <circle cx="57" cy="32" r="3" fill="url(#woodLight)" stroke="#4A2510" stroke-width="0.6"/>
        <rect x="48" y="31" width="18" height="2.5" rx="1.2" fill="#A0A0A0" stroke="#666" stroke-width="0.5"/>
        <rect x="46" y="27" width="4" height="10" rx="1.5" fill="#555" stroke="#333" stroke-width="0.5"/>
        <rect x="44" y="28.5" width="3" height="7" rx="1" fill="#444" stroke="#333" stroke-width="0.4"/>
        <rect x="64" y="27" width="4" height="10" rx="1.5" fill="#555" stroke="#333" stroke-width="0.5"/>
        <rect x="67" y="28.5" width="3" height="7" rx="1" fill="#444" stroke="#333" stroke-width="0.4"/>
      </svg>`;

      const img = new Image();
      const blob = new Blob([svg], {type: 'image/svg+xml'});
      const url = URL.createObjectURL(blob);
      img.onload = () => {
        // Center the tiki in the canvas with padding
        const pad = s * 0.1;
        const drawW = s - pad * 2;
        const drawH = s - pad * 2;
        const aspect = 80 / 100;
        let w, h;
        if (drawW / drawH > aspect) {
          h = drawH;
          w = h * aspect;
        } else {
          w = drawW;
          h = w / aspect;
        }
        const x = (s - w) / 2;
        const y = (s - h) / 2;
        ctx.drawImage(img, x, y, w, h);
        URL.revokeObjectURL(url);
      };
      img.src = url;
    }

    drawIcon(document.getElementById('icon192'));
    drawIcon(document.getElementById('icon512'));
  </script>
</body>
</html>
